<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaallatamaa Rewards</title>
    <script>
      (function() {
        var highVersion = '8.0';
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; },
          mocked: true
        };

        var mockShowPopup = function(params, callback) {
          console.log('Mocked showPopup call suppressed:', params);
          if (callback) callback(params.buttons ? params.buttons[0].id : null);
        };

        var mockShowAlert = function(msg, callback) {
          console.log('Mocked showAlert:', msg);
          alert(msg);
          if (callback) callback();
        };

        function patchWebApp(obj) {
          if (!obj) return;
          try {
            // Suppress SDK errors by forcing version
            obj.version = highVersion;
            
            // Override properties to be robust
            Object.defineProperty(obj, 'version', { get: function() { return highVersion; }, configurable: true });
            Object.defineProperty(obj, 'isVersionAtLeast', { value: function() { return true; }, configurable: true });
            Object.defineProperty(obj, 'CloudStorage', { value: mockStorage, configurable: true });
            Object.defineProperty(obj, 'showPopup', { value: mockShowPopup, configurable: true });
            Object.defineProperty(obj, 'showAlert', { value: mockShowAlert, configurable: true });

            if (obj.initDataUnsafe) {
              obj.initDataUnsafe.version = highVersion;
            }
          } catch (e) {
            console.warn("Patch failed", e);
          }
        }

        // Intercept Telegram object
        var _tg = window.Telegram || {};
        Object.defineProperty(window, 'Telegram', {
          get: function() { return _tg; },
          set: function(v) { 
            _tg = v; 
            if (_tg && _tg.WebApp) patchWebApp(_tg.WebApp);
          },
          configurable: true
        });

        // Patch already existing one if script loaded fast
        if (_tg.WebApp) patchWebApp(_tg.WebApp);

        // Fallback for anyone already checking version
        setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.version !== highVersion) {
            patchWebApp(window.Telegram.WebApp);
          }
        }, 30);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://libtl.com/sdk.js' data-zone='10937696' data-sdk='show_10937696'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

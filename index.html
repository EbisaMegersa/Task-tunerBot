<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TASK TUNER</title>
    <script>
      (function() {
        var highVersion = '8.0';
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; }
        };

        var mockShowPopup = function(params, callback) {
          console.log('Mocked showPopup call suppressed:', params);
          if (callback) callback(params.buttons ? params.buttons[0].id : null);
        };

        function patchWebApp(obj) {
          if (!obj) return;
          try {
            // Force higher version to enable all features
            Object.defineProperty(obj, 'version', { 
              value: highVersion, 
              enumerable: true,
              configurable: true 
            });
            obj.isVersionAtLeast = function() { return true; };
            
            if (!obj.CloudStorage) {
              obj.CloudStorage = mockStorage;
            }
            if (!obj.showPopup) {
              obj.showPopup = mockShowPopup;
            }
            if (obj.initDataUnsafe) obj.initDataUnsafe.version = highVersion;
          } catch (e) {
            console.warn("WebApp patch error:", e);
          }
        }

        // Pre-configure Telegram
        window.Telegram = window.Telegram || {};
        window.Telegram.WebApp = window.Telegram.WebApp || {};
        patchWebApp(window.Telegram.WebApp);

        // Periodic maintenance to ensure mocks persist through Telegram init
        var checkCount = 0;
        var patchInterval = setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp) {
            if (window.Telegram.WebApp.version !== highVersion || !window.Telegram.WebApp.CloudStorage) {
              patchWebApp(window.Telegram.WebApp);
            }
          }
          if (++checkCount > 100) clearInterval(patchInterval);
        }, 50);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://libtl.com/sdk.js' data-zone='10937696' data-sdk='show_10937696'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaallatamaa Rewards</title>
    <script>
      (function() {
        // Suppress Telegram WebApp SDK version support error messages
        var originalError = console.error;
        console.error = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && (arguments[0].indexOf('is not supported') !== -1)) {
            return;
          }
          originalError.apply(console, arguments);
        };

        var highVersion = '8.0';
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; },
          mocked: true
        };

        var mockShowPopup = function(params, callback) {
          console.log('Mocked showPopup call suppressed:', params);
          if (callback) callback(params.buttons ? params.buttons[0].id : null);
        };

        function patchWebApp(obj) {
          if (!obj) return;
          try {
            Object.defineProperty(obj, 'version', { 
              value: highVersion, 
              writable: false, 
              configurable: true 
            });
            Object.defineProperty(obj, 'isVersionAtLeast', { 
              value: function() { return true; }, 
              writable: false, 
              configurable: true 
            });
            Object.defineProperty(obj, 'CloudStorage', { 
              value: mockStorage, 
              writable: false, 
              configurable: true 
            });
            Object.defineProperty(obj, 'showPopup', { 
              value: mockShowPopup, 
              writable: false, 
              configurable: true 
            });
            if (obj.initDataUnsafe) obj.initDataUnsafe.version = highVersion;
          } catch (e) {
            // Silently fail if non-configurable
          }
        }

        // Periodic check to ensure the version and mock stay patched
        setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp) {
             if (window.Telegram.WebApp.version !== highVersion || !window.Telegram.WebApp.CloudStorage || !window.Telegram.WebApp.CloudStorage.mocked) {
               patchWebApp(window.Telegram.WebApp);
             }
          }
        }, 30);

        // Define Telegram with a robust getter/setter to catch WebApp initialization
        var _tp = window.Telegram || {};
        Object.defineProperty(window, 'Telegram', {
          get: function() { return _tp; },
          set: function(val) {
            _tp = val || {};
            if (_tp.WebApp) patchWebApp(_tp.WebApp);
          },
          configurable: true
        });
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://libtl.com/sdk.js' data-zone='10951745' data-sdk='show_10951745'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
